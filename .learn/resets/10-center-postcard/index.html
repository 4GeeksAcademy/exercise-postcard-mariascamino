<!DOCTYPE html>
<html lang="en">
	<head>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<!-- Outer div -->
		<div class="postcard">
			<!-- Main white card div -->
			<div class="main-card">
				<!-- Top div: title + logo -->
				<div class="top-section">
					<h1>My Postcard</h1>
					<img
						src="https://storage.googleapis.com/breathecode-asset-images/5318bde604cf5c915f94897a71b49ab2523101322ea21cb046db1e67c24fa3be.png?raw=true"
						alt="Logo"
					/>
				</div>

				<!-- Middle div: message + form -->
				<div class="middle-section">
					<!-- Left: postcard text -->
					<div class="message-area">
						<p>Look how awesome! This is a postcard that I created using HTML5 and CSS3 during my 4Geeks Academy Course!</p>
						<p>This is so cool, can't wait to start doing more stuff!</p>
					</div>

					<!-- Right: form -->
					<div class="form-area">
						<input type="text" placeholder="Some Name" />
						<input type="email" placeholder="Some Email" />
						<textarea placeholder="Some comment"></textarea>
					</div>
				</div>

				<!-- Bottom div: button -->
				<div class="bottom-section">
					<button type="button">Send My Postcard</button>
				</div>
			</div>
		</div>
	</body>
</html>
